  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000000;
      overflow: hidden;
      font-family: 'EB Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .nav-left {
      position: fixed;
      top: 24px; left: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-size: 18px;
      text-decoration: none;
      text-shadow: 0 0 14px rgba(255,255,255,0.4), 0 0 28px rgba(255,255,255,0.2);
      transition: opacity 0.2s;
    }

    .nav-left:hover { opacity: 0.7; }

    .nav-right {
      position: fixed;
      top: 24px; right: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-right a {
      color: #ffffff;
      font-size: 18px;
      font-family: 'EB Garamond', serif;
      text-decoration: none;
      text-shadow: 0 0 14px rgba(255,255,255,0.4), 0 0 28px rgba(255,255,255,0.2);
      transition: opacity 0.2s;
    }

    .nav-right a:hover { opacity: 0.6; }

    @media (max-width: 767px) {
      .nav-left { top: 16px; left: 16px; font-size: 15px; }
      .nav-right { top: 16px; right: 16px; gap: 16px; }
      .nav-right a { font-size: 15px; }
    }

    @media (min-width: 768px) {
      .nav-left  { top: 32px; left: 48px;  font-size: 20px; }
      .nav-right { top: 32px; right: 48px; }
      .nav-right a { font-size: 20px; }
    }

    @media (min-width: 1024px) {
      .nav-left  { top: 40px; left: 64px; }
      .nav-right { top: 40px; right: 64px; }
    }
  </style>
</head>
<body>
