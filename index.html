  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000 url('sf_nostalgic_hq.png') center center / cover no-repeat fixed;
      overflow: hidden;
      font-family: 'EB Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      image-rendering: high-quality;
    }

    /* Edge vignette blur */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(0,0,0,0.55) 80%,
        rgba(0,0,0,0.85) 100%

      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;

    #ascii-art {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      font-family: 'Courier New', monospace;
      white-space: pre;
      line-height: 1;
      pointer-events: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      filter:
        drop-shadow(0 0 3px rgba(0,0,0,1))
        drop-shadow(0 0 6px rgba(0,0,0,0.9))
        drop-shadow(0 0 8px rgba(253,239,178,1))
        drop-shadow(0 0 20px rgba(253,239,178,0.9))
        drop-shadow(0 0 50px rgba(253,239,178,0.6));
      will-change: filter;
    }

    #ascii-art .c {
      color: #F8F6F0;
    }

    /* ── Nav ── */
    .nav-left {

      top: 24px; left: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-size: 18px;
      text-decoration: none;
      text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 24px rgba(255,255,255,0.4);
      transition: opacity 0.2s;
    }

    .nav-left:hover { opacity: 0.7; }

    .nav-right {
      position: fixed;
      top: 24px; right: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-right a {
      color: #ffffff;
      font-size: 18px;
      font-family: 'EB Garamond', serif;
      text-decoration: none;
      text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 24px rgba(255,255,255,0.4);
      transition: opacity 0.2s;
    }

    .nav-right a:hover { opacity: 0.6; }

    /* ── Tagline ── */
    .tagline {
      position: fixed;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      color: #ffffff;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 18px;
      text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 24px rgba(255,255,255,0.4);
      letter-spacing: 0.05em;
    }

    @media (min-width: 768px) {
      .nav-left  { top: 32px; left: 48px;  font-size: 20px; }
      .nav-right { top: 32px; right: 48px; }
      .nav-right a { font-size: 20px; }
      .tagline { font-size: 20px; }
    }

    @media (min-width: 1024px) {
      .nav-left  { top: 40px; left: 64px; }
      .nav-right { top: 40px; right: 64px; }
    }

    .social-bottom {
      position: fixed;
      bottom: 8%;
      right: 48px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 7px;
      color: #ffffff;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 18px;
      text-decoration: none;
      text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 24px rgba(255,255,255,0.4);
      transition: opacity 0.2s;
    }
    .social-bottom:hover { opacity: 0.6; }
    .social-bottom svg { flex-shrink: 0; }

    .inspo {
      position: fixed;
      bottom: 8%;
      left: 48px;
      z-index: 20;
      color: #ffffff;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 14px;
      text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 24px rgba(255,255,255,0.4);
      opacity: 0.6;
      letter-spacing: 0.04em;
    }

    #cursor-text {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 100;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s;
      will-change: transform;
    }
  </style>
</head>
<body>

  <script>
    const DPR = window.devicePixelRatio || 1;

    // ─── ASCII Art ────────────────────────────────────────────────
    const CLOVER = `




                                                            -==-
                                                       -@@@@@@@@@@@@=
                                                     *@@@@@#=.  .+#@@@%
                                                   :@@@@#            *@@-
                                                  *@@@#                #@+
                                                 @@@@                   :@@@@@@@@@@@-
                                                -@@@                             =@@@@@
                       .+***+-                  @@@                                 =@@@%
                    %@@@@@@@@@@@@@*            +@@+                                   %@@%
                 :@@@@@%-     :+@@@@@%         #@@                                     @@@@
                *@@@%              :@@@@       %@@                                      @@@
               %@@@                   +@@@     @@@                                      @@@
               @@%                      +@@*   @@@                                      @@@
              +@@                         %@@  @@@                                      @@@
              *@%                          :@@%@@@                                     #@@*
              -@#                            @@@@@                                    -@@%
               @@                             @@@@-                                   @@@
            =@@@+                              %@@@                                 =@@%
          %@@#                                  %@@.                               @@@=
        =@@@                                     @@%                             #@@%
       =@@@                                      :@@-                          %@@%
       @@@.                                       *@@                       -@@@#
      *@@@                                         @@@                   -@@@@%
      *@@@                                         @@@@              .%@@@@@@@@@@@@@@@@@@@@@#
      +@@@.                                        .@@@@        :%@@@@@@@%*:            :#@@@@@@+
       @@@@                                         @@@@@@@@@@@@@@@#                         :@@@@@
        @@@@                                       *@@@@@@@@@@@=                                *@@@@
         @@@@%                                  *@@@@@@@@@@@                                      #@@@.
          -@@@@%.                           +%@@@@@@@@@@@@#                                        =@@@
             @@@@@@*.                 =*@@@@@@%=      *@@@@                                         %@@%
                *@@@@@@@@@@@@@@@@@@@@@@@@#.            -@@@.                                         @@@
                     .-+*##%%%##@@@@@%.                 =@@@                                         @@@
                              *@@@%                      *@@.                                       =@@*
                            %@@@+                         @@%                                       @@@
                          %@@@                             @@%                                     @@@
                        #@@@.                              %@@.                                  =@@%
                       @@@*                                 @@@:                               %@@*
                     .@@@.                                  %@@@.                            :@-
                     @@@:                                   -@@@@=                            @@
                    @@@*                                     @@@@@%                           @@
                   -@@@                                      @@@@@@@                          @@
                   %@@#                                      @@@@-@@@%                       %@@
                   @@@#                                      @@*+# -@@@#                    @@@
                   @@@%                                      @@- %*  +@@@@.               *@@@:
                   =@@@:                                    :@@   @    +@@@@@%.        -@@@@@
                    @@@@:                                   #@@   %#      #@@@@@@@@@@@@@@@@
                     %@@@%                                 .@@=    @-         =@@@@@@@@%
                      -@@@@@-                              @@@     *@
                         %@@@@@@@%@@@@                    @@@.      @.
                              :-:   .@%                 -@@@:       @@
                                     =@@*             .@@@@         *@
                                       @@@@+       .#@@@@+           @+
                                         %@@@@@@@@@@@@@+             @#
                                            +#@@@@%*-                %@
                                                                     #@
                                                                     *@.
                                                                     *@-
                                                                     *@-
                                                                     *@:
                                                                     #@
                                                                     @@
                                                                     @#
                                                                    %@=
                                                                    @@
                                                                   +@*
                                                                   @@
                                                                  @@+
                                                                 +@#
                                                                =@@
                                                               :@@
                                                              =@@
                                                             #@%
                                                            @@*
                                                          -@@-
                                                         #@%

                                                                                                                    `;

    const GLYPHS = '@#%&*+=~?!$^:.';
    const container = document.getElementById('ascii-art');
    const lines = CLOVER.split('\n');
    const cols  = Math.max(...lines.map(l => l.length));
    const allSpans = [];

    // Build DOM once
    lines.forEach(line => {
      const row = document.createElement('div');
      for (let c = 0; c < line.length; c++) {
        if (line[c] !== ' ') {
          const span = document.createElement('span');
          span.className = 'c';
          span.textContent = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
          row.appendChild(span);
          allSpans.push({ el: span, flipAt: Math.random() * 3000 });
        } else {
          row.appendChild(document.createTextNode(' '));
        }
      }
      container.appendChild(row);
    });

    function resize() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      // monospace char width ≈ 0.6 × font-size
      const byWidth  = (W * 0.45) / (cols * 0.6);
      const byHeight = (H * 0.42) / lines.length;
      const fs = Math.max(Math.min(byWidth, byHeight), 5);
      container.style.fontSize   = fs + 'px';
      container.style.lineHeight = '1';
    }

    resize();
    window.addEventListener('resize', resize);

    function animate(t) {
      for (const s of allSpans) {
        if (t >= s.flipAt) {
          s.el.textContent = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
          s.flipAt = t + 400 + Math.random() * 2000;
        }
      }
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    // ─── Cursor Text ──────────────────────────────────────────────
    const TEXTS        = ["i desire to be the real me", "i desire to be free"];
    const CURSOR_CHARS = "_!X$0-+*#";
    const SPEED        = 14; // ms per frame
    let textIndex      = 0;

    const cursorEl = document.getElementById('cursor-text');
    let cursorX = -999, cursorY = -999;
    let phase = 'idle';
    let step  = 0;
    let intervalId = null;
    let animStarted = false;

    function randChar(prev) {
      let c;
      do { c = CURSOR_CHARS[Math.floor(Math.random() * CURSOR_CHARS.length)]; }
      while (c === prev);
      return c;
    }

    function stopInterval() {
      if (intervalId) { clearInterval(intervalId); intervalId = null; }
    }

    function startCursorAnim() {
      stopInterval();
      phase = 'phase1';
      step  = 0;

      intervalId = setInterval(() => {
        const TARGET_TEXT = TEXTS[textIndex];
        const len = TARGET_TEXT.length;

        if (phase === 'phase1') {
          const curLen = Math.min(step + 1, len);
          let chars = [];
          for (let i = 0; i < curLen; i++)
            chars.push(randChar(chars[i - 1]));
          for (let i = curLen; i < len; i++)
            chars.push('\u00A0');
          cursorEl.textContent = chars.join('');
          if (step < len - 1) { step++; }
          else { phase = 'phase2'; step = 0; }

        } else {
          const revealed = Math.floor(step / 2);
          let chars = [];
          for (let i = 0; i < revealed && i < len; i++)
            chars.push(TARGET_TEXT[i]);
          if (revealed < len)
            chars.push(step % 2 === 0 ? '_' : randChar());
          while (chars.length < len) chars.push(randChar());
          cursorEl.textContent = chars.join('');

          if (step < len * 2 - 1) { step++; }
          else {
            cursorEl.textContent = TARGET_TEXT;
            stopInterval();
            textIndex = (textIndex + 1) % TEXTS.length;
            setTimeout(startCursorAnim, 800);
          }
        }
      }, SPEED);
    }

    // rAF loop: keep position perfectly in sync with cursor
    function tickPosition() {
      cursorEl.style.transform = `translate(calc(${cursorX}px - 50%), calc(${cursorY}px + 28px))`;
      requestAnimationFrame(tickPosition);
    }
    requestAnimationFrame(tickPosition);

    document.addEventListener('mousemove', (e) => {
      cursorX = e.clientX;
      cursorY = e.clientY;
      if (!animStarted) {
        animStarted = true;
        cursorEl.style.opacity = '1';
        startCursorAnim();
      }
    });

    document.addEventListener('mouseleave', () => {
      stopInterval();
      animStarted = false;
      cursorEl.style.opacity = '0';
    });

  </script>

</body>
