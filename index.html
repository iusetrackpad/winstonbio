<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winston Zhang</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080d14;
      --bg-2: #0d1520;
      --bg-3: #131d2a;
      --border: #1e2d40;
      --text: #deeeff;
      --text-muted: #5a7a9a;
      --text-dim: #2a4060;
      --accent: #5bb8f5;
      --accent-dim: rgba(91, 184, 245, 0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 48px;
      height: 60px;
      background: rgba(8,13,20,0.85);
      backdrop-filter: blur(16px);
    }

    .nav-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .nav-logo span { color: var(--accent); }

    /* ── Hero ── */
    section {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px;
    }

    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 60px;
    }

    .hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-name {
      font-size: clamp(40px, 7vw, 72px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 24px;
      animation: bob 3s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .hero-name .dim { color: var(--text-dim); }

    .hero-typewriter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      color: var(--accent);
      margin-bottom: 28px;
      height: 24px;
    }

    .hero-typewriter .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .hero-bio {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .hero-bio strong { color: var(--text); font-weight: 500; }

    .hero-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #7ecbf7; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: #333;
      background: var(--bg-3);
    }

    /* ── Loader ── */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #loader.hidden { opacity: 0; visibility: hidden; }

    .loader-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      color: var(--text);
      letter-spacing: 0.08em;
    }

    .loader-logo span { color: var(--accent); }

    .loader-bar-track {
      width: 160px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      animation: loadbar 2.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes loadbar {
      0%   { width: 0%; }
      60%  { width: 80%; }
      100% { width: 100%; }
    }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <!-- Snow Canvas -->
  <canvas id="snow" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;"></canvas>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-logo">iusetrackpad<span>.</span></div>
    <div class="loader-bar-track">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <!-- Nav -->
  <nav>
    <div class="nav-logo">wz<span>.</span></div>
  </nav>

  <!-- Hero -->
  <section id="hero">
    <p class="hero-eyebrow">Engineering Portfolio</p>
    <h1 class="hero-name">
      Winston Zhang<span class="dim">.</span>
    </h1>
    <div class="hero-typewriter"><span id="typewriter-text"></span><span class="cursor"></span></div>
    <p class="hero-bio">
      From Lego Vending Machines To <strong>Industrial Engineering Robotics</strong>.
    </p>
    <div class="hero-links">
      <a href="more-of-me/" class="btn btn-primary">More of Me</a>
      <a href="https://github.com/iusetrackpad" target="_blank" rel="noopener" class="btn btn-ghost">GitHub</a>
      <a href="https://www.linkedin.com/in/winston-zhang-2525942b0" target="_blank" rel="noopener" class="btn btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        LinkedIn
      </a>
    </div>
  </section>

  <script>
    // Snow
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let flakes = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 120; i++) {
      flakes.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 2.5 + 0.5,
        speed: Math.random() * 0.8 + 0.3,
        drift: Math.random() * 0.4 - 0.2,
        opacity: Math.random() * 0.5 + 0.2,
      });
    }

    function drawSnow() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      flakes.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(91, 184, 245, ${f.opacity})`;
        ctx.fill();
        f.y += f.speed;
        f.x += f.drift;
        if (f.y > canvas.height) { f.y = -f.r; f.x = Math.random() * canvas.width; }
        if (f.x > canvas.width) f.x = 0;
        if (f.x < 0) f.x = canvas.width;
      });
      requestAnimationFrame(drawSnow);
    }
    drawSnow();

    // Force scroll to top on load
    history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);

    // Loader
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
      }, 3000);
    });

    // Typewriter
    const words = ['passionate', 'engineering', 'robotics', 'craves internships'];
    let wi = 0, ci = 0, deleting = false;
    const el = document.getElementById('typewriter-text');

    function type() {
      const word = words[wi];
      if (!deleting) {
        el.textContent = word.slice(0, ++ci);
        if (ci === word.length) { deleting = true; setTimeout(type, 1400); return; }
        setTimeout(type, 90);
      } else {
        el.textContent = word.slice(0, --ci);
        if (ci === 0) { deleting = false; wi = (wi + 1) % words.length; setTimeout(type, 400); return; }
        setTimeout(type, 50);
      }
    }
    type();
  </script>

</body>
</html>
